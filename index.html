<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Element 61 is not a traditional media agency."/>
    <meta name="keywords" content="design, content, media, strategy, publishing"/>
    <meta name="apple-mobile-web-app-title" content="Element 61" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Element 61</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f7f7f7;
      color: #111;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      width: min(90vw, 360px);
    }
    .logo {
      width: 100%;
      max-width: 220px;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      background: white;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }
    .hero a {
      display: inline-block;
      color: #0077cc;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: color .2s ease, transform .2s ease;
    }
    .hero a:hover,
    .hero a:focus {
      color: #005fa3;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="hero">
    <img class="logo" src="img/element61-400px.png" alt="Element 61 logo" />
    <a href="enquiries.html" aria-label="Send Enquiries">Enquiries</a>
  </main>
</body>
</html>
